<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <title>Panneau – Dr. Iannotta Maxime</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #c8d4e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: Jost, sans-serif;
      padding: 32px 16px;
    }

    .print-btn {
      margin-bottom: 24px;
      padding: 10px 28px;
      background: #1a4a7a;
      color: white;
      border: none;
      border-radius: 8px;
      font-family: Jost, sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
    }
    .print-btn:hover { background: #0d2f52; }

    /* Panneau 10x15cm */
    .panel {
      width: 100mm;
      height: 150mm;
      background: #061a2e;
      border-radius: 6px;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 7mm;
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
    }

    /* Blobs */
    .panel::before {
      content: '';
      position: absolute;
      width: 80mm; height: 70mm;
      top: -25mm; left: -20mm;
      background: radial-gradient(ellipse, rgba(26,74,122,0.55) 0%, transparent 70%);
      border-radius: 50%;
    }
    .panel::after {
      content: '';
      position: absolute;
      width: 60mm; height: 60mm;
      bottom: -20mm; right: -15mm;
      background: radial-gradient(ellipse, rgba(13,53,96,0.5) 0%, transparent 70%);
      border-radius: 50%;
    }

    .inner {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      gap: 0;
    }

    /* Logo */
    .logo img {
      width: 12mm; height: 12mm;
      object-fit: contain;
      filter: drop-shadow(0 1px 6px rgba(255,255,255,0.2));
      margin-bottom: 3mm;
    }

    /* Identité */
    .doctor-label {
      font-size: 6pt;
      font-weight: 400;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(240,246,255,0.4);
      margin-bottom: 1mm;
    }
    .fullname {
      font-family: 'Playfair Display', serif;
      font-size: 14pt;
      font-weight: 500;
      letter-spacing: 0.05em;
      color: rgba(240,246,255,0.88);
      margin-bottom: 2mm;
    }
    .specialty-line {
      display: flex;
      align-items: center;
      gap: 2mm;
      margin-bottom: 5mm;
    }
    .s-rule {
      flex: 1; max-width: 10mm; height: 0.4px;
      background: linear-gradient(90deg, transparent, #c8a96e);
    }
    .s-rule.r { background: linear-gradient(90deg, #c8a96e, transparent); }
    .specialty {
      font-size: 6pt;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #c8a96e;
    }

    /* Séparateur */
    .sep {
      width: 100%; height: 0.4px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      margin-bottom: 5mm;
    }

    /* QR Code centré */
    .qr-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3mm;
    }
    .qr-label {
      font-size: 6pt;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(90,122,153,0.9);
      text-align: center;
    }
    .qr-box {
      background: white;
      border-radius: 2mm;
      padding: 2mm;
      display: inline-flex;
    }
    #qrcode canvas, #qrcode img {
      width: 35mm !important;
      height: 35mm !important;
      display: block;
    }
    .qr-caption {
      font-size: 6pt;
      font-weight: 300;
      letter-spacing: 0.08em;
      color: rgba(90,122,153,0.75);
      text-align: center;
      line-height: 1.8;
      margin-top: 1mm;
    }

    /* Footer coordonnées */
    .footer {
      margin-top: 5mm;
      text-align: center;
      border-top: 0.4px solid rgba(255,255,255,0.08);
      padding-top: 3mm;
      width: 100%;
    }
    .footer-name {
      font-size: 6.5pt;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(240,246,255,0.5);
      margin-bottom: 1.5mm;
    }
    .footer-info {
      font-size: 5.5pt;
      font-weight: 300;
      letter-spacing: 0.1em;
      color: rgba(90,122,153,0.7);
      line-height: 1.9;
    }

    @media print {
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      body { background: white; padding: 0; }
      .print-btn { display: none; }
      .panel { box-shadow: none; border-radius: 0; width: 100mm; height: 150mm; }
    }
  </style>
</head>
